name: Build Blocklist

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Combine lists
        run: |
          mkdir -p output
          cat blocklists/*.txt | sort -u > output/combined.txt

      - name: Commit updated list
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/combined.txt
          git commit -m "Update combined blocklist" || echo "No changes"
          git push
