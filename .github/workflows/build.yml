name: Build Blocklist

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep coreutils

      - name: Create build folders
        run: |
          mkdir -p build
          mkdir -p output

      - name: Download sources
        run: |
          while read url; do
            echo "Downloading $url"
            curl -L "$url" >> build/raw_filters.txt
            echo "" >> build/raw_filters.txt
          done < sources/sources.txt

      - name: Extract domains
        run: |
          grep -oE '([a-zA-Z0-9_-]+\.)+[a-zA-Z]{2,}' build/raw_filters.txt \
          | sort -u > build/extracted_domains.txt

      - name: Combine with local blocklists
        run: |
          cat build/extracted_domains.txt blocklists/*.txt 2>/dev/null \
          | sort -u > output/combined.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output/combined.txt

          git commit -m "Auto update blocklist" || echo "No changes"

          git push
