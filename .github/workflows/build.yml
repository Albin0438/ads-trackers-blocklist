name: Build Blocklist

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Prepare folders
        run: |
          mkdir -p build
          mkdir -p output

      - name: Download sources
        run: |
          while read url; do
            echo "Downloading $url"
            curl -L "$url" >> build/raw_filters.txt
          done < sources/sources.txt

      - name: Remove comments and empty lines
        run: |
          grep -vE '^\s*$|^\s*#' build/raw_filters.txt > build/cleaned.txt

      - name: Extract domains
        run: |
          grep -oE '([a-zA-Z0-9_-]+\.)+[a-zA-Z]{2,}' build/cleaned.txt \
          | sort -u > build/extracted_domains.txt

      - name: Combine with local lists
        run: |
          if [ -d blocklists ]; then
            cat build/extracted_domains.txt blocklists/*.txt 2>/dev/null \
            | sort -u > output/combined.txt
          else
            cp build/extracted_domains.txt output/combined.txt
          fi

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/combined.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Daily blocklist update"
            git push
          fi
